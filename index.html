<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>AutoTactics v3 - スマホ対応テストプレイモック</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151c2f;
            --bg-card-hover: #1e2844;
            --border: #2a3756;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --offense: #00f2fe;
            --offense-bg: rgba(0, 242, 254, 0.12);
            --defense: #ff0844;
            --defense-bg: rgba(255, 8, 68, 0.12);
            --wall: #475569;
            --rock: #ef4444;    /* 〇 グー */
            --scissors: #10b981; /* △ チョキ */
            --paper: #3b82f6;    /* □ パー */
            --accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }

        header {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(180deg, rgba(21, 28, 47, 0.95) 0%, rgba(11, 15, 25, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-select {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            outline: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem;
        }

        .wave-badge {
            background: var(--accent);
            color: #000;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .score-display {
            font-weight: 700;
            color: var(--offense);
        }

        main {
            width: 100%;
            max-width: 480px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* BANNER */
        .banner {
            background: var(--bg-card);
            border-left: 4px solid var(--offense);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            line-height: 1.4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .banner-text {
            flex: 1;
        }

        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.08);
            padding: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .debug-toggle.active {
            background: var(--accent);
            color: #000;
            font-weight: 700;
        }

        /* GRID BOARD */
        .board-container {
            position: relative;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .board-headers {
            display: grid;
            grid-template-columns: 24px repeat(5, 1fr);
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-sub);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 24px repeat(5, 1fr);
            align-items: center;
            margin-bottom: 4px;
        }

        .row-label {
            font-size: 0.7rem;
            color: var(--text-sub);
            font-weight: 700;
            text-align: center;
        }

        .cell {
            aspect-ratio: 1;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .cell.zone-defense {
            background: rgba(255, 8, 68, 0.08);
            border-color: rgba(255, 8, 68, 0.2);
        }

        .cell.zone-offense {
            background: rgba(0, 242, 254, 0.08);
            border-color: rgba(0, 242, 254, 0.2);
        }

        .cell.goal-line::after {
            content: '突破GOAL';
            position: absolute;
            top: 2px;
            font-size: 0.55rem;
            color: rgba(255, 8, 68, 0.4);
            font-weight: 800;
            pointer-events: none;
        }

        .cell:active {
            transform: scale(0.95);
        }

        /* PIECES & WALLS */
        .wall {
            width: 86%;
            height: 86%;
            background: linear-gradient(135deg, #475569, #334155);
            border: 2px solid #64748b;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: #f8fafc;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2);
        }

        .piece {
            width: 88%;
            height: 88%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .piece.offense {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border: 2px solid #38bdf8;
        }

        .piece.defense {
            background: linear-gradient(135deg, #be123c, #881337);
            border: 2px solid #fb7185;
        }

        .piece.blind {
            background: linear-gradient(135deg, #334155, #1e293b);
            border: 2px dashed #94a3b8;
        }

        .piece-shape {
            font-size: 0.85rem;
            font-weight: 900;
            line-height: 1;
        }

        .shape-rock { color: var(--rock); }
        .shape-scissors { color: var(--scissors); }
        .shape-paper { color: var(--paper); }

        .piece-name {
            font-size: 0.55rem;
            font-weight: 700;
            color: #fff;
            max-width: 95%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .piece-dir {
            position: absolute;
            top: -4px;
            right: -2px;
            background: #000;
            color: #fff;
            font-size: 0.55rem;
            padding: 0 3px;
            border-radius: 4px;
            border: 1px solid #fff;
        }

        /* DECK / PANELS */
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }

        .panel-title {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cost-badge {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: #fff;
        }

        .deck-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .card.selected {
            border-color: var(--offense);
            background: var(--offense-bg);
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        .card.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .card-shape {
            font-size: 1.1rem;
        }

        .card-name {
            font-size: 0.6rem;
            font-weight: 700;
            text-align: center;
        }

        .card-cost {
            font-size: 0.6rem;
            color: var(--accent);
            font-weight: 800;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #000;
        }

        .btn-danger {
            background: linear-gradient(90deg, #ff0844, #ff4e50);
            color: #fff;
        }

        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        /* LOGS */
        .log-box {
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.4);
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .log-entry {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 2px;
        }

        .log-turn { color: var(--accent); font-weight: 700; }
        .log-win { color: var(--offense); font-weight: 700; }
        .log-lose { color: var(--defense); }

        /* TAB SELECTOR FOR DECK BUILD */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 6px;
        }

        .tab {
            flex: 1;
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-sub);
        }

        .tab.active {
            background: var(--bg-card-hover);
            color: #fff;
            border: 1px solid var(--border);
        }

        .dir-toggle {
            font-size: 0.7rem;
            background: var(--bg-card-hover);
            color: #fff;
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 4px;
            width: 100%;
            text-align: center;
        }

        /* POPUP SCORE */
        @keyframes popup {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-30px) scale(1.2); opacity: 0; }
        }

        .floating-text {
            position: absolute;
            font-weight: 900;
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 50;
            animation: popup 1s forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">
            <span>🛡️ AutoTactics v3</span>
        </div>
        <select id="modeSelect" class="mode-select" onchange="changeMode()">
            <option value="challenge">🎯 チャレンジモード</option>
            <option value="edit">🛠️ 防衛作成(エディット)</option>
            <option value="sandbox">🧪 自由サンドボックス</option>
        </select>
    </div>
    <div class="status-bar">
        <div>
            <span class="wave-badge" id="waveDisplay">WAVE 1 / 3</span>
            <span id="turnDisplay" style="margin-left:8px; font-weight:700;">Turn: 0/10</span>
        </div>
        <div class="score-display" id="scoreDisplay">合計スコア: 0点</div>
    </div>
</header>

<main>
    <!-- メッセージバナー -->
    <div class="banner">
        <div class="banner-text" id="bannerText">
            Wave 1: 駒の正体と壁が隠された初見殺しステージ。盤面タップでユニットを配置してください。
        </div>
        <div class="debug-toggle" id="debugToggle" onclick="toggleDebug()">
            👁️ 透視OFF
        </div>
    </div>

    <!-- 防衛プリセット選択 (チャレンジ時) / タブ -->
    <div id="challengePresetBar" style="display: flex; gap: 6px; align-items: center; font-size: 0.75rem;">
        <span style="color:var(--text-sub);">敵陣プリセット:</span>
        <select id="presetSelect" class="mode-select" style="flex:1;" onchange="loadPreset()">
            <option value="1">ステージ1: 鉄壁と斥候陣</option>
            <option value="2">ステージ2: ジグザグ迷宮</option>
            <option value="3">ステージ3: 突撃兵奇襲</option>
        </select>
    </div>

    <!-- エディット用タブ -->
    <div id="editTabBar" class="tabs" style="display: none;">
        <div class="tab active" onclick="setEditTab('wall')">🧱 壁配置 (コスト: <span id="wallCostText">0/5</span>)</div>
        <div class="tab" onclick="setEditTab('w1')">W1防衛 (<span id="defW1CostText">0/10</span>)</div>
        <div class="tab" onclick="setEditTab('w2')">W2防衛 (<span id="defW2CostText">0/10</span>)</div>
        <div class="tab" onclick="setEditTab('w3')">W3防衛 (<span id="defW3CostText">0/10</span>)</div>
    </div>

    <!-- 盤面 (5x5) -->
    <div class="board-container">
        <div class="board-headers">
            <div></div>
            <div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
        </div>
        <div id="boardGrid">
            <!-- JSで動的に生成 -->
        </div>
    </div>

    <!-- ユニット選択 / コントロールパネル -->
    <div class="panel">
        <div class="panel-title">
            <span id="deckTitle">攻撃ユニット配置 (手札)</span>
            <span class="cost-badge" id="costDisplay">残りコスト: 10 / 10</span>
        </div>

        <div id="deckContainer" class="deck-grid">
            <!-- JSで手札を生成 -->
        </div>

        <div id="dirToggleBtn" class="dir-toggle" style="display:none;" onclick="toggleSelectedDir()">
            斜め移動の向き: ↖ 左斜め前
        </div>
    </div>

    <!-- アクションボタン -->
    <div class="controls">
        <button class="btn btn-secondary" id="resetBtn" onclick="resetCurrentWave()">
            🔄 配置リセット
        </button>
        <button class="btn btn-primary" id="actionBtn" onclick="onActionClick()">
            ▶️ バトル開始
        </button>
    </div>

    <!-- 三すくみヒントとログ -->
    <div class="panel">
        <div class="panel-title" style="margin-bottom:4px;">
            <span>バトルログ</span>
            <span style="font-size:0.65rem; color:var(--text-sub);">〇(赤)＞△(緑)＞□(青)＞〇</span>
        </div>
        <div class="log-box" id="logBox">
            <div class="log-entry">ゲーム開始。ユニットを選択して盤面下段(攻撃エリア)に配置してください。</div>
        </div>
    </div>
</main>

<script>
    /* =========================================================================
       ユニット定義 (全9種)
       ========================================================================= */
    const UNIT_TYPES = {
        swordsman: { id: 'swordsman', name: '剣士', shape: '〇', shapeClass: 'shape-rock', cost: 1, desc: '毎ターン前1進む' },
        berserker: { id: 'berserker', name: '狂戦士', shape: '〇', shapeClass: 'shape-rock', cost: 2, desc: '毎ターン前2進む' },
        heavy_infantry: { id: 'heavy_infantry', name: '重歩兵', shape: '〇', shapeClass: 'shape-rock', cost: 2, desc: '奇数ターンに前1進む' },
        
        scout: { id: 'scout', name: '斥候', shape: '△', shapeClass: 'shape-scissors', cost: 1, diagonal: true, desc: '毎ターン斜め前1(壁反射)' },
        assassin: { id: 'assassin', name: '暗殺者', shape: '△', shapeClass: 'shape-scissors', cost: 2, diagonal: true, desc: '斜め前1→直進1を交互' },
        cavalry: { id: 'cavalry', name: '軽騎兵', shape: '△', shapeClass: 'shape-scissors', cost: 2, diagonal: true, desc: '毎ターン斜め前2(壁反射)' },
        
        squire: { id: 'squire', name: '従者', shape: '□', shapeClass: 'shape-paper', cost: 1, desc: '毎ターン前1進む(□属性)' },
        sentinel: { id: 'sentinel', name: '番兵', shape: '□', shapeClass: 'shape-paper', cost: 2, desc: '移動しない(壁役)' },
        spearman: { id: 'spearman', name: '槍兵', shape: '□', shapeClass: 'shape-paper', cost: 2, desc: '1ターン待機後、前2進む' }
    };

    /* 三すくみ判定: 1(攻撃側勝利), -1(防衛側勝利), 0(あいこ) */
    function resolveRPS(shapeA, shapeB) {
        if (shapeA === shapeB) return 0;
        if (
            (shapeA === '〇' && shapeB === '△') ||
            (shapeA === '△' && shapeB === '□') ||
            (shapeA === '□' && shapeB === '〇')
        ) return 1;
        return -1;
    }

    /* =========================================================================
       ゲームステート
       ========================================================================= */
    let currentMode = 'challenge'; // 'challenge' | 'edit' | 'sandbox'
    let currentWave = 1;
    let currentTurn = 0;
    let totalScore = 0;
    let isBattling = false;
    let battleTimer = null;
    let debugMode = false;
    let editTab = 'wall'; // 'wall' | 'w1' | 'w2' | 'w3'

    // 手札選択状態
    let selectedUnitId = 'swordsman';
    let selectedDiagDir = -1; // -1: 左斜め, 1: 右斜め

    // プレイヤーが選んだ攻撃デッキ (5種固定または自由に)
    const playerDeck = ['swordsman', 'berserker', 'scout', 'sentinel', 'spearman'];

    // 盤面データ (5x5)
    // cells[y][x]: { wall: boolean, offense: Piece|null, defense: Piece|null }
    const BOARD_SIZE = 5;
    let board = [];

    // 防衛データプリセット保持用
    let defenseData = {
        walls: [], // [{x, y}]
        wave1: [], // [{typeId, x, y, dirX}]
        wave2: [], // [{typeId, x, y, dirX}]
        wave3: []  // [{typeId, x, y, dirX}]
    };

    // ウェーブ開始時の配置記憶(リセット用)
    let waveInitialOffense = [];

    /* =========================================================================
       初期化とプリセット
       ========================================================================= */
    function init() {
        initBoard();
        loadPreset();
        renderDeck();
        updateUI();
    }

    function initBoard() {
        board = [];
        for (let y = 0; y < BOARD_SIZE; y++) {
            let row = [];
            for (let x = 0; x < BOARD_SIZE; x++) {
                row.push({ wall: false, offense: null, defense: null });
            }
            board.push(row);
        }
    }

    function loadPreset() {
        const pId = document.getElementById('presetSelect').value;
        defenseData = { walls: [], wave1: [], wave2: [], wave3: [] };

        if (pId === '1') {
            // ステージ1: 中央に壁、番兵でガード
            defenseData.walls = [{x: 1, y: 2}, {x: 3, y: 2}];
            defenseData.wave1 = [
                {typeId: 'sentinel', x: 2, y: 1},
                {typeId: 'swordsman', x: 0, y: 1},
                {typeId: 'scout', x: 4, y: 1, dirX: -1}
            ];
            defenseData.wave2 = [
                {typeId: 'sentinel', x: 2, y: 1},
                {typeId: 'berserker', x: 1, y: 1},
                {typeId: 'scout', x: 3, y: 1, dirX: 1},
                {typeId: 'squire', x: 0, y: 1}
            ];
            defenseData.wave3 = [
                {typeId: 'spearman', x: 2, y: 0},
                {typeId: 'assassin', x: 1, y: 1, dirX: 1},
                {typeId: 'cavalry', x: 3, y: 1, dirX: -1},
                {typeId: 'sentinel', x: 4, y: 1}
            ];
        } else if (pId === '2') {
            // ステージ2: ジグザグ迷宮
            defenseData.walls = [{x: 0, y: 2}, {x: 2, y: 2}, {x: 4, y: 2}];
            defenseData.wave1 = [
                {typeId: 'scout', x: 1, y: 1, dirX: 1},
                {typeId: 'scout', x: 3, y: 1, dirX: -1},
                {typeId: 'squire', x: 2, y: 1}
            ];
            defenseData.wave2 = [
                {typeId: 'cavalry', x: 1, y: 1, dirX: -1},
                {typeId: 'assassin', x: 3, y: 1, dirX: 1},
                {typeId: 'sentinel', x: 2, y: 0}
            ];
            defenseData.wave3 = [
                {typeId: 'berserker', x: 0, y: 1},
                {typeId: 'berserker', x: 4, y: 1},
                {typeId: 'heavy_infantry', x: 2, y: 1}
            ];
        } else {
            // ステージ3: 突撃兵奇襲
            defenseData.walls = [{x: 2, y: 1}, {x: 2, y: 3}];
            defenseData.wave1 = [
                {typeId: 'spearman', x: 1, y: 1},
                {typeId: 'spearman', x: 3, y: 1}
            ];
            defenseData.wave2 = [
                {typeId: 'berserker', x: 0, y: 1},
                {typeId: 'berserker', x: 4, y: 1},
                {typeId: 'sentinel', x: 2, y: 0}
            ];
            defenseData.wave3 = [
                {typeId: 'cavalry', x: 0, y: 0, dirX: 1},
                {typeId: 'cavalry', x: 4, y: 0, dirX: -1},
                {typeId: 'assassin', x: 2, y: 0, dirX: -1}
            ];
        }

        currentWave = 1;
        totalScore = 0;
        currentTurn = 0;
        setupWave(1);
    }

    function setupWave(waveNum) {
        if (isBattling) stopBattle();
        currentWave = waveNum;
        currentTurn = 0;
        initBoard();

        // 壁配置
        if (currentMode !== 'challenge' || debugMode || currentWave > 1) {
            // 2ウェーブ目以降は判明した壁などを表示(モックでは全てまたは発見済みを表示)
            defenseData.walls.forEach(w => board[w.y][w.x].wall = true);
        } else if (debugMode) {
            defenseData.walls.forEach(w => board[w.y][w.x].wall = true);
        }

        // 防衛ユニット配置
        const defUnits = defenseData[`wave${waveNum}`] || [];
        defUnits.forEach(u => {
            board[u.y][u.x].defense = {
                typeId: u.typeId,
                dirX: u.dirX || -1,
                revealed: (currentWave > 1 || debugMode || currentMode !== 'challenge') // 1ウェーブ目はハーフブラインド
            };
        });

        waveInitialOffense = [];
        addLog(`--- Wave ${waveNum} 開始 --- 配置をお決めください。`);
        updateUI();
    }

    /* =========================================================================
       UI描画・更新
       ========================================================================= */
    function updateUI() {
        renderBoard();
        renderDeck();

        document.getElementById('waveDisplay').innerText = `WAVE ${currentWave} / 3`;
        document.getElementById('turnDisplay').innerText = `Turn: ${currentTurn} / 10`;
        document.getElementById('scoreDisplay').innerText = `合計スコア: ${totalScore}点`;

        // コスト計算
        const costEl = document.getElementById('costDisplay');
        if (currentMode === 'edit') {
            const wCost = defenseData.walls.length * 1; // 1マス1
            document.getElementById('wallCostText').innerText = `${wCost}/5`;
            ['w1', 'w2', 'w3'].forEach((w, idx) => {
                const c = defenseData[`wave${idx+1}`].reduce((sum, u) => sum + UNIT_TYPES[u.typeId].cost, 0);
                document.getElementById(`defW${idx+1}CostText`).innerText = `${c}/10`;
            });
            costEl.innerText = `エディットモード編集中`;
        } else {
            let usedCost = 0;
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const off = board[y][x].offense;
                    if (off) usedCost += UNIT_TYPES[off.typeId].cost;
                }
            }
            costEl.innerText = `残りコスト: ${10 - usedCost} / 10`;
        }

        // ボタンテキスト変更
        const btn = document.getElementById('actionBtn');
        if (isBattling) {
            btn.innerHTML = `⏸️ 一時停止`;
            btn.className = 'btn btn-danger';
        } else if (currentTurn > 0 && currentTurn < 10) {
            btn.innerHTML = `▶️ 次のターンへ進む (自動/タップ)`;
            btn.className = 'btn btn-primary';
        } else if (currentTurn >= 10) {
            btn.innerHTML = currentWave < 3 ? `次ウェーブへ (WAVE ${currentWave+1})` : `🏆 結果発表 (リセット)`;
            btn.className = 'btn btn-primary';
        } else {
            btn.innerHTML = `▶️ バトル開始 (自動進行)`;
            btn.className = 'btn btn-primary';
        }

        // 向きトグル表示
        const uDef = UNIT_TYPES[selectedUnitId];
        const dirBtn = document.getElementById('dirToggleBtn');
        if (uDef && uDef.diagonal) {
            dirBtn.style.display = 'block';
            dirBtn.innerText = selectedDiagDir === -1 ? `斜め移動の向き: ↖ 左斜め前` : `斜め移動の向き: ↗ 右斜め前`;
        } else {
            dirBtn.style.display = 'none';
        }
    }

    function renderBoard() {
        const gridEl = document.getElementById('boardGrid');
        gridEl.innerHTML = '';

        for (let y = 0; y < BOARD_SIZE; y++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'grid-row';

            const label = document.createElement('div');
            label.className = 'row-label';
            label.innerText = (y + 1);
            rowDiv.appendChild(label);

            for (let x = 0; x < BOARD_SIZE; x++) {
                const cellEl = document.createElement('div');
                cellEl.className = 'cell';

                // ゾーン色分け
                if (y === 0) cellEl.classList.add('zone-defense', 'goal-line');
                if (y === BOARD_SIZE - 1) cellEl.classList.add('zone-offense');

                const cellData = board[y][x];

                // 壁の描画
                if (cellData.wall) {
                    const wallEl = document.createElement('div');
                    wallEl.className = 'wall';
                    wallEl.innerText = 'WALL';
                    cellEl.appendChild(wallEl);
                }

                // 防衛ユニット描画
                if (cellData.defense) {
                    cellEl.appendChild(createPieceEl(cellData.defense, 'defense'));
                }

                // 攻撃ユニット描画
                if (cellData.offense) {
                    cellEl.appendChild(createPieceEl(cellData.offense, 'offense'));
                }

                cellEl.onclick = () => onCellClick(x, y);
                rowDiv.appendChild(cellEl);
            }
            gridEl.appendChild(rowDiv);
        }
    }

    function createPieceEl(pieceData, side) {
        const def = UNIT_TYPES[pieceData.typeId];
        const el = document.createElement('div');
        
        // ハーフブラインド状態の確認
        const isBlind = (side === 'defense' && !pieceData.revealed && !debugMode && currentMode === 'challenge' && currentWave === 1);
        el.className = `piece ${side} ${isBlind ? 'blind' : ''}`;

        const shapeEl = document.createElement('div');
        shapeEl.className = `piece-shape ${def.shapeClass}`;
        shapeEl.innerText = def.shape;
        el.appendChild(shapeEl);

        const nameEl = document.createElement('div');
        nameEl.className = 'piece-name';
        nameEl.innerText = isBlind ? '？？？' : def.name;
        el.appendChild(nameEl);

        if (def.diagonal && !isBlind) {
            const dirEl = document.createElement('div');
            dirEl.className = 'piece-dir';
            dirEl.innerText = pieceData.dirX === -1 ? '↖' : '↗';
            el.appendChild(dirEl);
        }

        return el;
    }

    function renderDeck() {
        const container = document.getElementById('deckContainer');
        container.innerHTML = '';

        const available = currentMode === 'sandbox' ? Object.keys(UNIT_TYPES) : playerDeck;

        available.forEach(typeId => {
            const def = UNIT_TYPES[typeId];
            const card = document.createElement('div');
            card.className = `card ${selectedUnitId === typeId ? 'selected' : ''}`;

            card.innerHTML = `
                <div class="card-shape ${def.shapeClass}">${def.shape}</div>
                <div class="card-name">${def.name}</div>
                <div class="card-cost">コスト ${def.cost}</div>
            `;
            card.onclick = () => {
                selectedUnitId = typeId;
                updateUI();
            };
            container.appendChild(card);
        });
    }

    /* =========================================================================
       ユーザーインタラクション
       ========================================================================= */
    function onCellClick(x, y) {
        if (isBattling || currentTurn > 0) return;

        if (currentMode === 'edit') {
            handleEditClick(x, y);
            return;
        }

        // チャレンジまたはサンドボックスの配置
        const cell = board[y][x];

        // 既に自分の駒がある場合は回収
        if (cell.offense) {
            cell.offense = null;
            updateUI();
            return;
        }

        // サンドボックスで防衛側エリアをタップした場合は敵駒も消せる
        if (currentMode === 'sandbox' && cell.defense) {
            cell.defense = null;
            updateUI();
            return;
        }

        // 配置可能エリアチェック (チャレンジでは最後列のみまたは空きマス)
        if (currentMode === 'challenge' && y < BOARD_SIZE - 2) {
            addLog('⚠️ チャレンジモードでは手前の攻撃ゾーン(4・5行目)にのみ配置できます。');
            return;
        }

        if (cell.wall || cell.defense) return;

        // コストチェック
        let usedCost = 0;
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                if (board[r][c].offense) usedCost += UNIT_TYPES[board[r][c].offense.typeId].cost;
            }
        }
        const unitDef = UNIT_TYPES[selectedUnitId];
        if (usedCost + unitDef.cost > 10) {
            addLog('⚠️ コスト上限(10)を超過するため配置できません。');
            return;
        }

        cell.offense = {
            typeId: selectedUnitId,
            dirX: selectedDiagDir
        };

        updateUI();
    }

    function handleEditClick(x, y) {
        const cell = board[y][x];
        if (editTab === 'wall') {
            // 壁トグル
            if (!cell.wall && defenseData.walls.length >= 5) {
                addLog('⚠️ 壁の配置上限(コスト5)に達しています。');
                return;
            }
            cell.wall = !cell.wall;
            if (cell.wall) {
                cell.defense = null;
                cell.offense = null;
                defenseData.walls.push({x, y});
            } else {
                defenseData.walls = defenseData.walls.filter(w => w.x !== x || w.y !== y);
            }
        } else {
            // 防衛ユニット配置
            const waveIdx = editTab === 'w1' ? 0 : (editTab === 'w2' ? 1 : 2);
            const wList = defenseData[`wave${waveIdx+1}`];

            if (cell.wall) return;
            if (cell.defense) {
                cell.defense = null;
                defenseData[`wave${waveIdx+1}`] = wList.filter(u => u.x !== x || u.y !== y);
            } else {
                const uCost = wList.reduce((s, u) => s + UNIT_TYPES[u.typeId].cost, 0);
                if (uCost + UNIT_TYPES[selectedUnitId].cost > 10) {
                    addLog('⚠️ 防衛ユニットのコスト上限(10)を超過します。');
                    return;
                }
                cell.defense = { typeId: selectedUnitId, dirX: selectedDiagDir, revealed: true };
                wList.push({ typeId: selectedUnitId, x, y, dirX: selectedDiagDir });
            }
        }
        updateUI();
    }

    function toggleSelectedDir() {
        selectedDiagDir = -selectedDiagDir;
        updateUI();
    }

    function toggleDebug() {
        debugMode = !debugMode;
        document.getElementById('debugToggle').classList.toggle('active', debugMode);
        document.getElementById('debugToggle').innerText = debugMode ? '👁️ 透視ON' : '👁️ 透視OFF';
        
        // 隠し壁の表示に反映
        if (debugMode) {
            defenseData.walls.forEach(w => board[w.y][w.x].wall = true);
        } else if (currentMode === 'challenge' && currentWave === 1) {
            // Wave 1でデバッグOFFにしたら壁を隠す
            for (let y=0; y<BOARD_SIZE; y++) {
                for (let x=0; x<BOARD_SIZE; x++) {
                    board[y][x].wall = false;
                }
            }
        }
        updateUI();
    }

    function changeMode() {
        currentMode = document.getElementById('modeSelect').value;
        const presetBar = document.getElementById('challengePresetBar');
        const editBar = document.getElementById('editTabBar');
        const banner = document.getElementById('bannerText');

        if (currentMode === 'challenge') {
            presetBar.style.display = 'flex';
            editBar.style.display = 'none';
            banner.innerText = 'Wave 1: 駒の正体と壁が隠された初見殺しステージ。盤面タップでユニットを配置してください。';
            loadPreset();
        } else if (currentMode === 'edit') {
            presetBar.style.display = 'none';
            editBar.style.display = 'flex';
            banner.innerText = '防衛作成: 壁(最大5)と各Waveの防衛ユニット(最大コスト10)を自由に配置できます。';
            initBoard();
            defenseData.walls.forEach(w => board[w.y][w.x].wall = true);
        } else {
            presetBar.style.display = 'none';
            editBar.style.display = 'none';
            banner.innerText = 'サンドボックス: 攻防全ユニットを自由に配置・実験できるデバッグ用エリアです。';
            initBoard();
        }
        updateUI();
    }

    function setEditTab(tab) {
        editTab = tab;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');

        initBoard();
        defenseData.walls.forEach(w => board[w.y][w.x].wall = true);
        if (tab !== 'wall') {
            const waveNum = tab === 'w1' ? 1 : (tab === 'w2' ? 2 : 3);
            defenseData[`wave${waveNum}`].forEach(u => {
                board[u.y][u.x].defense = { typeId: u.typeId, dirX: u.dirX, revealed: true };
            });
        }
        updateUI();
    }

    function resetCurrentWave() {
        if (isBattling) stopBattle();
        setupWave(currentWave);
    }

    /* =========================================================================
       オートバトル進行ロジック
       ========================================================================= */
    function onActionClick() {
        if (currentMode === 'edit') {
            addLog('💡 エディットモードで配置したデータは自動的に保存され、「チャレンジモード」へ切り替えるとテストプレイできます！');
            document.getElementById('modeSelect').value = 'challenge';
            changeMode();
            return;
        }

        if (currentTurn >= 10) {
            // 次のウェーブまたはリセット
            if (currentWave < 3) {
                setupWave(currentWave + 1);
            } else {
                addLog(`🏆 3ウェーブ終了！ 最終スコア: ${totalScore}点！ お疲れ様でした。`);
                loadPreset();
            }
            return;
        }

        if (isBattling) {
            stopBattle();
        } else {
            startBattle();
        }
    }

    function startBattle() {
        isBattling = true;
        updateUI();

        // 0ターンの場合は初動記録
        if (currentTurn === 0) {
            waveInitialOffense = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x].offense) {
                        waveInitialOffense.push({ x, y, u: JSON.parse(JSON.stringify(board[y][x].offense)) });
                    }
                }
            }
            addLog('⚔️ オートバトル開始！');
        }

        battleTimer = setInterval(() => {
            stepTurn();
            if (currentTurn >= 10 || checkBattleEnd()) {
                stopBattle();
                onWaveEnd();
            }
        }, 900);
    }

    function stopBattle() {
        isBattling = false;
        if (battleTimer) clearInterval(battleTimer);
        updateUI();
    }

    function stepTurn() {
        currentTurn++;
        addLog(`--- ターン ${currentTurn} ---`);

        // 1ステップ目移動処理
        executeStepMove(1);

        // 2ステップ移動ユニット(狂戦士、軽騎兵、または偶数ターンの槍兵)の処理
        executeStepMove(2);

        updateUI();
    }

    function executeStepMove(stepNum) {
        // 各ユニットの意図する移動先を算出
        let moves = []; // { side: 'offense'|'defense', fromX, fromY, toX, toY, unit }

        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                ['offense', 'defense'].forEach(side => {
                    const u = board[y][x][side];
                    if (!u) return;

                    const def = UNIT_TYPES[u.typeId];
                    let stepCount = 1;

                    // ユニットごとの移動ステップ数や条件
                    if (def.id === 'sentinel') stepCount = 0;
                    if (def.id === 'heavy_infantry' && currentTurn % 2 === 0) stepCount = 0;
                    if (def.id === 'spearman') stepCount = (currentTurn % 2 === 0) ? 2 : 0;
                    if (def.id === 'berserker' || def.id === 'cavalry') stepCount = 2;

                    // 今回の処理ステップ(stepNum=1 or 2)に該当しない場合は動かない
                    if (stepNum > stepCount) return;

                    // 移動先計算
                    let forward = side === 'offense' ? -1 : 1;
                    let nextY = y + forward;
                    let nextX = x;

                    if (def.diagonal) {
                        // 斜め移動 (斥候、暗殺者、軽騎兵)
                        // 暗殺者は偶数ターンは直進
                        if (def.id === 'assassin' && currentTurn % 2 === 0) {
                            nextX = x;
                        } else {
                            nextX = x + u.dirX;
                            // 壁または盤面端の反射判定
                            if (nextX < 0 || nextX >= BOARD_SIZE || board[y][nextX].wall || (nextY>=0 && nextY<BOARD_SIZE && board[nextY][nextX].wall)) {
                                u.dirX = -u.dirX;
                                nextX = x + u.dirX;
                                if (nextX < 0 || nextX >= BOARD_SIZE) nextX = x;
                            }
                        }
                    }

                    // 正面に壁がある場合は進めない
                    if (nextY >= 0 && nextY < BOARD_SIZE && board[nextY][nextX].wall) {
                        // 壁発見！ハーフブラインド時でも壁を可視化
                        board[nextY][nextX].wall = true;
                        addLog(`🧱 [壁発見] (${nextX+1}, ${nextY+1}) に壁が存在！`);
                        nextY = y;
                        nextX = x;
                    }

                    // ゴールライン到達時の処理
                    moves.push({ side, fromX: x, fromY: y, toX: nextX, toY: nextY, unit: u });
                });
            }
        }

        // 渋滞(味方同士の重なり)判定と解決
        // 移動先が同じ味方がいる、または前方が動けない味方の場合は待機
        moves.forEach(m => {
            if (m.toX === m.fromX && m.toY === m.fromY) return;
            
            // 盤面外(突破)は渋滞しない
            if (m.toY < 0 || m.toY >= BOARD_SIZE) return;

            // 同じセルに移動しようとしている味方がいるかチェック
            const allyAtTarget = board[m.toY][m.toX][m.side];
            if (allyAtTarget) {
                // その味方も今回動いて空くならOK、動かないなら渋滞で停止
                const allyMove = moves.find(mv => mv.side === m.side && mv.fromX === m.toX && mv.fromY === m.toY);
                if (!allyMove || (allyMove.toX === allyMove.fromX && allyMove.toY === allyMove.fromY)) {
                    m.toX = m.fromX;
                    m.toY = m.fromY;
                }
            }
        });

        // 移動と戦闘の適用
        // まず盤面から移動対象を一度クリア
        moves.forEach(m => {
            board[m.fromY][m.fromX][m.side] = null;
        });

        moves.forEach(m => {
            // 突破判定 (攻撃側が最奥Y<0に到達)
            if (m.side === 'offense' && m.toY < 0) {
                totalScore += 3;
                showPopup('突破 +3点!', m.fromX, 0, '#00f2fe');
                addLog(`🚀 [突破] ${UNIT_TYPES[m.unit.typeId].name} が最奥ラインへ到達！(+3点)`);
                return;
            }
            if (m.side === 'defense' && m.toY >= BOARD_SIZE) {
                return; // 防衛側が最前線に抜けたら消滅
            }

            // セルに配置を試みる
            const targetCell = board[m.toY][m.toX];

            // すれ違い戦闘のチェック: 敵が m.toX, m.toY から m.fromX, m.fromY へ移動していないか
            const enemySide = m.side === 'offense' ? 'defense' : 'offense';
            const crossingEnemy = moves.find(e => e.side === enemySide && e.fromX === m.toX && e.fromY === m.toY && e.toX === m.fromX && e.toY === m.fromY);

            if (crossingEnemy && m.side === 'offense') {
                // すれ違い発生！攻撃側処理時にまとめて戦闘解決
                handleCombat(m.unit, crossingEnemy.unit, m.toX, m.toY, true);
                return;
            } else if (crossingEnemy && m.side === 'defense') {
                return; // 攻撃側で解決済み
            }

            // 同一マスでの衝突チェック
            if (targetCell[enemySide]) {
                const enemyUnit = targetCell[enemySide];
                if (m.side === 'offense') {
                    const survived = handleCombat(m.unit, enemyUnit, m.toX, m.toY, false);
                    if (survived) targetCell.offense = m.unit;
                    targetCell.defense = survived === enemyUnit ? enemyUnit : null;
                } else {
                    const survived = handleCombat(enemyUnit, m.unit, m.toX, m.toY, false);
                    if (survived) targetCell.defense = m.unit;
                    targetCell.offense = survived === enemyUnit ? enemyUnit : null;
                }
            } else {
                targetCell[m.side] = m.unit;
            }
        });
    }

    function handleCombat(offUnit, defUnit, x, y, isCrossing) {
        const offDef = UNIT_TYPES[offUnit.typeId];
        const defDef = UNIT_TYPES[defUnit.typeId];

        // 戦闘が発生した敵は正体を明かす！
        defUnit.revealed = true;

        const res = resolveRPS(offDef.shape, defDef.shape);
        const locText = isCrossing ? `すれ違い` : `(${x+1}, ${y+1})`;

        if (res === 1) {
            // 攻撃勝利
            totalScore += 1;
            showPopup('撃破 +1点!', x, y, '#10b981');
            addLog(`<span class="log-win">💥 [戦闘勝] ${locText}: 攻撃[${offDef.name}] vs 防衛[${defDef.name}] ➔ 撃破！(+1点)</span>`);
            return offUnit;
        } else if (res === -1) {
            // 防衛勝利
            addLog(`<span class="log-lose">💀 [戦闘負] ${locText}: 攻撃[${offDef.name}] vs 防衛[${defDef.name}] ➔ 迎撃された...</span>`);
            return defUnit;
        } else {
            // あいこ
            addLog(`⚔️ [相打ち] ${locText}: 攻撃[${offDef.name}] vs 防衛[${defDef.name}] ➔ 両者消滅！`);
            return null;
        }
    }

    function checkBattleEnd() {
        let offCount = 0;
        let defCount = 0;
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                if (board[y][x].offense) offCount++;
                if (board[y][x].defense) defCount++;
            }
        }
        return offCount === 0;
    }

    function onWaveEnd() {
        let survivors = 0;
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                if (board[y][x].offense) survivors++;
            }
        }
        if (survivors > 0) {
            totalScore += survivors;
            addLog(`🎉 Wave ${currentWave} 終了！ 生存ボーナス +${survivors}点！`);
        } else {
            addLog(`終了！ Wave ${currentWave} 終了時生存ユニットなし。`);
        }
        updateUI();
    }

    function addLog(msg) {
        const box = document.getElementById('logBox');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = msg;
        box.prepend(entry);
    }

    function showPopup(text, x, y, color) {
        const container = document.querySelector('.board-container');
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.color = color;
        el.style.left = `${(x / BOARD_SIZE) * 80 + 15}%`;
        el.style.top = `${(y / BOARD_SIZE) * 80 + 10}%`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    window.onload = init;
</script>
</body>
</html>
